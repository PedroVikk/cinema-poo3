<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- corpo da claquete -->
  <rect x="10" y="34" width="80" height="56" rx="5" fill="#212529"/>
  <!-- parte superior (clapper) -->
  <rect x="10" y="18" width="80" height="22" rx="5" fill="#343a40"/>
  <rect x="10" y="30" width="80" height="10" fill="#343a40"/>
  <!-- listras diagonais na claquete -->
  <line x1="22" y1="18" x2="10" y2="40" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="37" y1="18" x2="25" y2="40" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="52" y1="18" x2="40" y2="40" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="67" y1="18" x2="55" y2="40" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="82" y1="18" x2="70" y2="40" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- divisa entre clapper e corpo -->
  <line x1="10" y1="40" x2="90" y2="40" stroke="#555" stroke-width="1.5"/>
  <!-- botão play no corpo -->
  <circle cx="50" cy="62" r="16" fill="#e63946" opacity="0.15"/>
  <polygon points="43,53 43,71 64,62" fill="white" opacity="0.85"/>
</svg>
