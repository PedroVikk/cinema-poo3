<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#c8d4f8"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- padrão para poltrona -->
    <pattern id="seatRow" x="0" y="0" width="32" height="40" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="9"  r="7.5" fill="#2a2a4a" opacity="0.75"/>
      <rect   x="5"  y="15" width="22" height="18" rx="3" fill="#2a2a4a" opacity="0.75"/>
    </pattern>
    <!-- padrão buracos película -->
    <pattern id="filmHole" x="0" y="0" width="40" height="10" patternUnits="userSpaceOnUse">
      <rect x="6" y="2" width="20" height="6" rx="1.5" fill="#444"/>
    </pattern>
  </defs>

  <!-- fundo -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- estrelas -->
  <circle cx="80"  cy="35" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="190" cy="18" r="1"   fill="white" opacity="0.35"/>
  <circle cx="340" cy="50" r="1.5" fill="white" opacity="0.45"/>
  <circle cx="490" cy="28" r="1"   fill="white" opacity="0.3"/>
  <circle cx="640" cy="42" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="760" cy="15" r="1"   fill="white" opacity="0.35"/>
  <circle cx="900" cy="48" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1060" cy="22" r="1"  fill="white" opacity="0.3"/>
  <circle cx="1150" cy="38" r="1.5" fill="white" opacity="0.45"/>

  <!-- brilho difuso atrás da tela -->
  <rect x="215" y="12" width="770" height="130" rx="10" fill="white" opacity="0.06" filter="url(#glow)"/>

  <!-- tela de cinema -->
  <rect x="220" y="18" width="760" height="118" rx="6" fill="url(#screenGrad)"/>
  <!-- moldura da tela -->
  <rect x="216" y="14" width="768" height="126" rx="8" fill="none" stroke="#666" stroke-width="2"/>
  <!-- área interna da tela -->
  <rect x="230" y="26" width="740" height="102" rx="4" fill="#b8c8f0" opacity="0.25"/>

  <!-- botão play na tela -->
  <circle cx="600" cy="77" r="30" fill="#1a1a2e" opacity="0.18"/>
  <polygon points="589,60 589,94 624,77" fill="#1a1a2e" opacity="0.22"/>

  <!-- texto sutil na tela -->
  <text x="600" y="86" font-family="Arial,sans-serif" font-size="30" font-weight="bold"
        text-anchor="middle" fill="#1a1a2e" opacity="0.12" letter-spacing="4">CINESYSTEM</text>

  <!-- ── CORTINAS ESQUERDA ── -->
  <path d="M0,0 L185,0 Q148,70 168,155 Q148,228 132,300 L0,300 Z" fill="#7a0000" opacity="0.92"/>
  <path d="M0,0 L128,0 Q98,78 118,162 Q98,240 82,300 L0,300 Z"   fill="#5a0000" opacity="0.88"/>
  <path d="M0,0 L72,0  Q55,82  68,168 Q52,250 42,300 L0,300 Z"   fill="#3a0000" opacity="0.78"/>
  <!-- dobras -->
  <path d="M155,0 Q120,76 138,158" fill="none" stroke="#cc0000" stroke-width="2.5" opacity="0.3"/>
  <path d="M96,0  Q74,82  88,166"  fill="none" stroke="#aa0000" stroke-width="1.5" opacity="0.25"/>

  <!-- ── CORTINAS DIREITA (espelho) ── -->
  <path d="M1200,0 L1015,0 Q1052,70 1032,155 Q1052,228 1068,300 L1200,300 Z" fill="#7a0000" opacity="0.92"/>
  <path d="M1200,0 L1072,0 Q1102,78 1082,162 Q1102,240 1118,300 L1200,300 Z" fill="#5a0000" opacity="0.88"/>
  <path d="M1200,0 L1128,0 Q1145,82 1132,168 Q1148,250 1158,300 L1200,300 Z" fill="#3a0000" opacity="0.78"/>
  <!-- dobras -->
  <path d="M1045,0 Q1080,76 1062,158" fill="none" stroke="#cc0000" stroke-width="2.5" opacity="0.3"/>
  <path d="M1104,0 Q1126,82 1112,166" fill="none" stroke="#aa0000" stroke-width="1.5" opacity="0.25"/>

  <!-- ── POLTRONAS (3 fileiras) ── -->
  <!-- fileira frontal -->
  <rect x="190" y="192" width="820" height="38" fill="url(#seatRow)"/>
  <!-- fileira do meio -->
  <rect x="158" y="233" width="884" height="38" fill="url(#seatRow)"/>
  <!-- fileira traseira -->
  <rect x="126" y="262" width="948" height="38" fill="url(#seatRow)"/>

  <!-- película de cinema (faixa inferior) -->
  <rect x="0" y="288" width="1200" height="12" fill="#111" opacity="0.8"/>
  <rect x="0" y="288" width="1200" height="12" fill="url(#filmHole)"/>

  <!-- película de cinema (faixa superior) -->
  <rect x="0" y="0" width="1200" height="10" fill="#111" opacity="0.75"/>
  <rect x="0" y="0" width="1200" height="10" fill="url(#filmHole)"/>
</svg>
