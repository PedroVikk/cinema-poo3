<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- corpo da película -->
  <rect x="14" y="10" width="72" height="80" rx="4" fill="#212529"/>
  <!-- buracos topo -->
  <rect x="18" y="12" width="11" height="8" rx="1.5" fill="#555"/>
  <rect x="33" y="12" width="11" height="8" rx="1.5" fill="#555"/>
  <rect x="48" y="12" width="11" height="8" rx="1.5" fill="#555"/>
  <rect x="63" y="12" width="11" height="8" rx="1.5" fill="#555"/>
  <!-- buracos base -->
  <rect x="18" y="80" width="11" height="8" rx="1.5" fill="#555"/>
  <rect x="33" y="80" width="11" height="8" rx="1.5" fill="#555"/>
  <rect x="48" y="80" width="11" height="8" rx="1.5" fill="#555"/>
  <rect x="63" y="80" width="11" height="8" rx="1.5" fill="#555"/>
  <!-- frames do filme -->
  <rect x="19" y="24" width="27" height="22" rx="3" fill="#343a40"/>
  <rect x="54" y="24" width="27" height="22" rx="3" fill="#343a40"/>
  <rect x="19" y="52" width="27" height="22" rx="3" fill="#343a40"/>
  <rect x="54" y="52" width="27" height="22" rx="3" fill="#343a40"/>
  <!-- play em cada frame -->
  <polygon points="24,31 24,41 38,36" fill="white" opacity="0.55"/>
  <polygon points="59,31 59,41 73,36" fill="white" opacity="0.55"/>
  <polygon points="24,59 24,69 38,64" fill="white" opacity="0.55"/>
  <!-- último frame: ícone vermelho destaque -->
  <circle cx="68" cy="63" r="10" fill="#e63946" opacity="0.9"/>
  <polygon points="63,57 63,69 76,63" fill="white"/>
</svg>
