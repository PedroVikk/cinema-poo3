<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programação - TV CULTURA</title>
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🎬 TV CULTURA</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
        <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
        <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
        <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
        <li class="nav-item"><a class="nav-link active" href="sessoes.html">Programação</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Cabeçalho da Página -->
<div class="page-header-banner">
  <div class="container d-flex align-items-center gap-3">
    <img src="../img/icon-programacao.svg" alt="Programação" class="page-icon">
    <div>
      <h1>Programação</h1>
      <p>Sessões disponíveis para compra de ingressos.</p>
    </div>
  </div>
</div>

<div class="container pb-4">
  <div id="conteudo"></div>
</div>

<footer class="text-center py-3 text-muted bg-light mt-5">
  <small>TV CULTURA &copy; 2025</small>
</footer>

<script src="../js/bootstrap.bundle.min.js"></script>
<script>
  function getFilmes()  { return JSON.parse(localStorage.getItem('filmes')  || '[]'); }
  function getSalas()   { return JSON.parse(localStorage.getItem('salas')   || '[]'); }
  function getSessoes() { return JSON.parse(localStorage.getItem('sessoes') || '[]'); }

  function formatarDataHora(dt) {
    if (!dt) return '-';
    const d = new Date(dt);
    return d.toLocaleString('pt-BR', { dateStyle: 'long', timeStyle: 'short' });
  }

  function render() {
    const sessoes = getSessoes();
    const filmes  = getFilmes();
    const salas   = getSalas();
    const container = document.getElementById('conteudo');

    if (sessoes.length === 0) {
      container.innerHTML = `
        <div class="alert alert-warning">
          Nenhuma sessão disponível no momento.
          <a href="cadastro-sessoes.html" class="alert-link">Cadastrar sessão</a>
        </div>
      `;
      return;
    }

    // Ordenar sessões por data/hora
    const sessoesSorted = [...sessoes].sort((a, b) => new Date(a.dataHora) - new Date(b.dataHora));

    container.innerHTML = `
      <div class="row g-4">
        ${sessoesSorted.map(s => {
          const filme = filmes.find(f => f.id === s.filmeId);
          const sala  = salas.find(sl => sl.id === s.salaId);
          const ingressos = JSON.parse(localStorage.getItem('ingressos') || '[]');
          const vendidos = ingressos.filter(i => i.sessaoId === s.id).length;
          const capacidade = sala ? sala.capacidade : 0;
          const disponivel = capacidade - vendidos;

          return `
            <div class="col-md-6 col-lg-4">
              <div class="card h-100 shadow-sm">
                <div class="card-header bg-dark text-white">
                  <h6 class="mb-0">${filme ? filme.titulo : 'Filme removido'}</h6>
                </div>
                <div class="card-body">
                  <p class="mb-1">
                    <span class="badge bg-secondary">${s.idioma}</span>
                    <span class="badge bg-dark ms-1">${s.formato}</span>
                    ${filme ? `<span class="badge bg-warning text-dark ms-1">${filme.classificacao === 'Livre' ? 'L' : filme.classificacao + '+'}</span>` : ''}
                  </p>
                  <p class="mb-1"><strong>Sala:</strong> ${sala ? sala.nome : 'Sala removida'} (${sala ? sala.tipo : '-'})</p>
                  <p class="mb-1"><strong>Data/Hora:</strong> ${formatarDataHora(s.dataHora)}</p>
                  <p class="mb-1"><strong>Preço:</strong> R$ ${Number(s.preco).toFixed(2)}</p>
                  <p class="mb-0 small text-muted">
                    ${disponivel > 0
                      ? `<span class="text-success">${disponivel} lugares disponíveis</span>`
                      : '<span class="text-danger">Esgotado</span>'}
                  </p>
                </div>
                <div class="card-footer bg-transparent">
                  <a href="venda-ingressos.html?sessaoId=${s.id}"
                     class="btn btn-dark w-100 ${disponivel <= 0 ? 'disabled' : ''}">
                    🎟️ Comprar Ingresso
                  </a>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  render();
</script>
</body>
</html>
