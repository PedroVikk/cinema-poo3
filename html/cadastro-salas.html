<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Salas - CineSystem</title>
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🎬 CineSystem</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
        <li class="nav-item"><a class="nav-link active" href="cadastro-salas.html">Salas</a></li>
        <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
        <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
        <li class="nav-item"><a class="nav-link" href="sessoes.html">Programação</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Cabeçalho da Página -->
<div class="page-header-banner">
  <div class="container d-flex align-items-center gap-3">
    <img src="../img/icon-salas.svg" alt="Salas" class="page-icon">
    <div>
      <h1>Cadastro de Salas</h1>
      <p>Gerencie as salas do cinema com capacidade e tipo.</p>
    </div>
  </div>
</div>

<div class="container pb-4">
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <form id="formSala" novalidate>
            <div class="mb-3">
              <label for="nome" class="form-label">Nome da Sala</label>
              <input type="text" class="form-control" id="nome" placeholder="Ex: Sala 1" required>
            </div>

            <div class="mb-3">
              <label for="capacidade" class="form-label">Capacidade</label>
              <input type="number" class="form-control" id="capacidade" min="1" placeholder="Ex: 150" required>
            </div>

            <div class="mb-3">
              <label for="tipo" class="form-label">Tipo</label>
              <select class="form-select" id="tipo" required>
                <option value="">Selecione...</option>
                <option value="2D">2D</option>
                <option value="3D">3D</option>
                <option value="IMAX">IMAX</option>
              </select>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-dark">Salvar Sala</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <h5>Salas Cadastradas</h5>
      <div id="listaSalas"></div>
    </div>
  </div>
</div>

<footer class="text-center py-3 text-muted bg-light mt-5">
  <small>CineSystem &copy; 2025</small>
</footer>

<script src="../js/bootstrap.bundle.min.js"></script>
<script>
  const form = document.getElementById('formSala');

  function getSalas() {
    return JSON.parse(localStorage.getItem('salas') || '[]');
  }

  function saveSalas(salas) {
    try {
      localStorage.setItem('salas', JSON.stringify(salas));
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        alert('Limite de armazenamento atingido!');
      }
    }
  }

  function renderSalas() {
    const salas = getSalas();
    const container = document.getElementById('listaSalas');

    if (salas.length === 0) {
      container.innerHTML = '<p class="text-muted">Nenhuma sala cadastrada ainda.</p>';
      return;
    }

    const tipoCor = { '2D': 'secondary', '3D': 'primary', 'IMAX': 'danger' };

    container.innerHTML = `
      <table class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th>Nome</th>
            <th>Capacidade</th>
            <th>Tipo</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${salas.map(s => `
            <tr>
              <td>${s.nome}</td>
              <td>${s.capacidade} lugares</td>
              <td><span class="badge bg-${tipoCor[s.tipo] || 'secondary'}">${s.tipo}</span></td>
              <td><button class="btn btn-outline-danger btn-sm" onclick="excluirSala('${s.id}')">✕</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function excluirSala(id) {
    if (!confirm('Deseja excluir esta sala?')) return;
    const salas = getSalas().filter(s => s.id !== id);
    saveSalas(salas);
    renderSalas();
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const nome = document.getElementById('nome').value.trim();
    const capacidade = document.getElementById('capacidade').value;
    const tipo = document.getElementById('tipo').value;

    if (!nome || !capacidade || !tipo) {
      alert('Preencha todos os campos.');
      return;
    }

    const sala = {
      id: String(Date.now()),
      nome,
      capacidade: Number(capacidade),
      tipo
    };

    const salas = getSalas();
    salas.push(sala);
    saveSalas(salas);

    form.reset();
    renderSalas();
  });

  renderSalas();
</script>
</body>
</html>
