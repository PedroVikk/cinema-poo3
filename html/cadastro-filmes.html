<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Filmes - TV CULTURA</title>
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">🎬 TV CULTURA</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="cadastro-filmes.html">Filmes</a></li>
        <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
        <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
        <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
        <li class="nav-item"><a class="nav-link" href="sessoes.html">Programação</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Cabeçalho da Página -->
<div class="page-header-banner">
  <div class="container d-flex align-items-center gap-3">
    <img src="../img/icon-filmes.svg" alt="Filmes" class="page-icon">
    <div>
      <h1>Cadastro de Filmes</h1>
      <p>Adicione e gerencie os filmes do catálogo.</p>
    </div>
  </div>
</div>

<div class="container pb-4">
  <div class="row g-4">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <form id="formFilme" novalidate>
            <div class="mb-3">
              <label for="titulo" class="form-label">Título</label>
              <input type="text" class="form-control" id="titulo" placeholder="Ex: Interestelar" required>
            </div>

            <div class="mb-3">
              <label for="genero" class="form-label">Gênero</label>
              <select class="form-select" id="genero" required>
                <option value="">Selecione...</option>
                <option>Ação</option>
                <option>Aventura</option>
                <option>Animação</option>
                <option>Comédia</option>
                <option>Drama</option>
                <option>Ficção Científica</option>
                <option>Horror</option>
                <option>Romance</option>
                <option>Suspense</option>
                <option>Terror</option>
                <option>Documentário</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="descricao" class="form-label">Descrição</label>
              <textarea class="form-control" id="descricao" rows="3" placeholder="Sinopse do filme..." required></textarea>
            </div>

            <div class="mb-3">
              <label for="classificacao" class="form-label">Classificação Indicativa</label>
              <select class="form-select" id="classificacao" required>
                <option value="">Selecione...</option>
                <option value="Livre">Livre</option>
                <option value="10">10 anos</option>
                <option value="12">12 anos</option>
                <option value="14">14 anos</option>
                <option value="16">16 anos</option>
                <option value="18">18 anos</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="duracao" class="form-label">Duração (minutos)</label>
              <input type="number" class="form-control" id="duracao" min="1" placeholder="Ex: 120" required>
            </div>

            <div class="mb-3">
              <label for="dataEstreia" class="form-label">Data de Estreia</label>
              <input type="date" class="form-control" id="dataEstreia" required>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-dark">Salvar Filme</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-7">
      <h5>Filmes Cadastrados</h5>
      <div id="listaFilmes"></div>
    </div>
  </div>
</div>

<footer class="text-center py-3 text-muted bg-light mt-5">
  <small>TV CULTURA &copy; 2025</small>
</footer>

<script src="../js/bootstrap.bundle.min.js"></script>
<script>
  const form = document.getElementById('formFilme');

  function getFilmes() {
    return JSON.parse(localStorage.getItem('filmes') || '[]');
  }

  function saveFilmes(filmes) {
    try {
      localStorage.setItem('filmes', JSON.stringify(filmes));
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        alert('Limite de armazenamento atingido!');
      }
    }
  }

  function renderFilmes() {
    const filmes = getFilmes();
    const container = document.getElementById('listaFilmes');

    if (filmes.length === 0) {
      container.innerHTML = '<p class="text-muted">Nenhum filme cadastrado ainda.</p>';
      return;
    }

    container.innerHTML = filmes.map(f => `
      <div class="card mb-2 shadow-sm">
        <div class="card-body py-2">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <strong>${f.titulo}</strong>
              <span class="badge bg-secondary ms-2">${f.genero}</span>
              <span class="badge bg-dark ms-1">${f.classificacao === 'Livre' ? 'L' : f.classificacao + '+'}</span>
              <br>
              <small class="text-muted">${f.duracao} min &bull; Estreia: ${formatarData(f.dataEstreia)}</small>
              <p class="mb-0 mt-1 small">${f.descricao}</p>
            </div>
            <button class="btn btn-outline-danger btn-sm ms-2" onclick="excluirFilme('${f.id}')">✕</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function formatarData(data) {
    if (!data) return '-';
    const [ano, mes, dia] = data.split('-');
    return `${dia}/${mes}/${ano}`;
  }

  function excluirFilme(id) {
    if (!confirm('Deseja excluir este filme?')) return;
    const filmes = getFilmes().filter(f => f.id !== id);
    saveFilmes(filmes);
    renderFilmes();
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const titulo = document.getElementById('titulo').value.trim();
    const genero = document.getElementById('genero').value;
    const descricao = document.getElementById('descricao').value.trim();
    const classificacao = document.getElementById('classificacao').value;
    const duracao = document.getElementById('duracao').value;
    const dataEstreia = document.getElementById('dataEstreia').value;

    if (!titulo || !genero || !descricao || !classificacao || !duracao || !dataEstreia) {
      alert('Preencha todos os campos.');
      return;
    }

    const filme = {
      id: String(Date.now()),
      titulo,
      genero,
      descricao,
      classificacao,
      duracao: Number(duracao),
      dataEstreia
    };

    const filmes = getFilmes();
    filmes.push(filme);
    saveFilmes(filmes);

    form.reset();
    renderFilmes();
  });

  renderFilmes();
</script>
</body>
</html>
